<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name= "description" content="A web developer's color palette generator.">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Color Palette Generator</title>
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
		<link rel="stylesheet" href="styles/style.css">
	</head>
	<body>
		<main class="container">
			<h1>Color Palette Generator</h1>
			<button id="generateButton">
				<i class="fas fa-sync-alt"></i>
				Generate Palette
			</button>
			<section class="paletteContainer">
				<section class="colorBox">
					<section class="color" style="background-color: #E1F5FE;"></section>
					<section class="colorInfo">
						<span class="hexValue">#E1F5FE</span>
						<i class="far fa-copy copyButton"></i>
					</section>
				</section>
				<section class="colorBox">
					<section class="color" style="background-color: #FEF0E1;"></section>
					<section class="colorInfo">
						<span class="hexValue">#FEF0E1</span>
						<i class="far fa-copy copyButton"></i>
					</section>
				</section>
				<section class="colorBox">
					<section class="color" style="background-color: #E4FEE1;"></section>
					<section class="colorInfo">
						<span class="hexValue">#E4FEE1</span>
						<i class="far fa-copy copyButton"></i>
					</section>
				</section>
				<section class="colorBox">
					<section class="color" style="background-color: #ECE1FE;"></section>
					<section class="colorInfo">
						<span class="hexValue">#ECE1FE</span>
						<i class="far fa-copy copyButton"></i>
					</section>
				</section>
				<section class="colorBox">
					<section class="color" style="background-color: #FEE1E4;"></section>
					<section class="colorInfo">
						<span class="hexValue">#FEE1E4</span>
						<i class="far fa-copy copyButton"></i>
					</section>
				</section>
			</section>
		</main>
		<script src="scripts/script.js"></script>
	</body>
</html>
